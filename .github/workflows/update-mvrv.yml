name: Update MVRV Data

on:
  schedule:
    - cron: '0 8 * * *'   # Runs every day at 08:00 UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  update-mvrv:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit the data file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch MVRV and save to file
        run: |
          set -e

          TODAY=$(date -u +%Y-%m-%d)
          OUTFILE="data/mvrv.json"
          mkdir -p data

          # ── Source 1: blockchain.info public charts API ──────────────
          echo "Trying blockchain.info..."
          RESPONSE=$(curl -sf --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (compatible; btc-dashboard)" \
            -H "Accept: application/json" \
            "https://api.blockchain.info/charts/mvrv?timespan=5days&sampled=false&format=json" || echo "")

          if [ -n "$RESPONSE" ]; then
            MVRV=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          vals = d.get('values', [])
          if vals:
              last = vals[-1]
              v = round(float(last['y']), 3)
              print(v)
          " 2>/dev/null || echo "")
            if [ -n "$MVRV" ] && [ "$MVRV" != "0.0" ]; then
              echo "blockchain.info OK: MVRV=$MVRV"
              echo "{\"mvrv\":$MVRV,\"date\":\"$TODAY\",\"source\":\"Blockchain.info\",\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > $OUTFILE
              echo "Saved to $OUTFILE"
              exit 0
            fi
          fi

          # ── Source 2: CoinMetrics community API ─────────────────────
          echo "Trying CoinMetrics..."
          RESPONSE2=$(curl -sf --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (compatible; btc-dashboard)" \
            -H "Accept: application/json" \
            "https://community-api.coinmetrics.io/v4/timeseries/asset-metrics?assets=btc&metrics=CapMrktCurUSD,CapRealUSD&frequency=1d&page_size=1" || echo "")

          if [ -n "$RESPONSE2" ]; then
            MVRV2=$(echo "$RESPONSE2" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          rows = d.get('data', [])
          if rows:
              r = rows[-1]
              mkt = float(r['CapMrktCurUSD'])
              real = float(r['CapRealUSD'])
              print(round(mkt / real, 3))
          " 2>/dev/null || echo "")
            if [ -n "$MVRV2" ] && [ "$MVRV2" != "0.0" ]; then
              echo "CoinMetrics OK: MVRV=$MVRV2"
              echo "{\"mvrv\":$MVRV2,\"date\":\"$TODAY\",\"source\":\"CoinMetrics\",\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > $OUTFILE
              echo "Saved to $OUTFILE"
              exit 0
            fi
          fi

          # ── Source 3: BGeometrics ────────────────────────────────────
          echo "Trying BGeometrics..."
          RESPONSE3=$(curl -sf --max-time 15 \
            -H "User-Agent: Mozilla/5.0 (compatible; btc-dashboard)" \
            -H "Accept: application/json" \
            "https://bitcoin-data.com/v1/mvrv-ratio" || echo "")

          if [ -n "$RESPONSE3" ]; then
            MVRV3=$(echo "$RESPONSE3" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if isinstance(d, list) and d:
              last = d[-1]
              v = last[1] if isinstance(last, list) else last.get('v', last.get('value'))
              print(round(float(v), 3))
          elif isinstance(d, dict) and 'v' in d:
              print(round(float(d['v'][-1]), 3))
          " 2>/dev/null || echo "")
            if [ -n "$MVRV3" ] && [ "$MVRV3" != "0.0" ]; then
              echo "BGeometrics OK: MVRV=$MVRV3"
              echo "{\"mvrv\":$MVRV3,\"date\":\"$TODAY\",\"source\":\"BGeometrics\",\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > $OUTFILE
              echo "Saved to $OUTFILE"
              exit 0
            fi
          fi

          # ── All sources failed — keep existing file if it exists ─────
          echo "All sources failed."
          if [ -f "$OUTFILE" ]; then
            echo "Keeping existing data file:"
            cat $OUTFILE
          else
            echo "{\"mvrv\":null,\"date\":\"$TODAY\",\"source\":\"unavailable\",\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > $OUTFILE
          fi

      - name: Commit and push updated MVRV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mvrv.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update MVRV data $(date -u +%Y-%m-%d)"
            git push
          fi

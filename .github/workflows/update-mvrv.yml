name: Update MVRV Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-mvrv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch MVRV and save to file
        run: |
          set -e
          mkdir -p data
          TODAY=$(date -u +%Y-%m-%d)
          UPDATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          OUTFILE="data/mvrv.json"

          # ── Method 1: blockchain.info direct MVRV chart ──────────────
          echo "==> Trying blockchain.info MVRV chart..."
          RESP=$(curl -sf --max-time 20 \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            "https://api.blockchain.info/charts/mvrv?timespan=5days&sampled=false&format=json") || true

          if [ -n "$RESP" ]; then
            MVRV=$(echo "$RESP" | python3 -c "
import json,sys
try:
  d=json.load(sys.stdin)
  v=d['values']
  if v:
    print(round(float(v[-1]['y']),3))
except: pass
" 2>/dev/null) || true
            if [ -n "$MVRV" ] && python3 -c "v=float('$MVRV'); assert 0.3<v<15" 2>/dev/null; then
              echo "OK — MVRV=$MVRV (blockchain.info)"
              echo "{\"mvrv\":$MVRV,\"date\":\"$TODAY\",\"source\":\"Blockchain.info\",\"updated\":\"$UPDATED\"}" > $OUTFILE
              exit 0
            fi
          fi

          # ── Method 2: Calculate from blockchain.info market-cap + realized-cap ──
          echo "==> Trying blockchain.info market-cap / realized-cap calculation..."
          MKT=$(curl -sf --max-time 20 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" \
            "https://api.blockchain.info/charts/market-cap?timespan=5days&sampled=false&format=json") || true
          REAL=$(curl -sf --max-time 20 \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" \
            "https://api.blockchain.info/charts/realized-cap?timespan=5days&sampled=false&format=json") || true

          if [ -n "$MKT" ] && [ -n "$REAL" ]; then
            MVRV=$(python3 -c "
import json
try:
  m=json.loads('''$MKT''')['values'][-1]['y']
  r=json.loads('''$REAL''')['values'][-1]['y']
  if r>0: print(round(float(m)/float(r),3))
except: pass
" 2>/dev/null) || true
            if [ -n "$MVRV" ] && python3 -c "v=float('$MVRV'); assert 0.3<v<15" 2>/dev/null; then
              echo "OK — MVRV=$MVRV (blockchain.info calculated)"
              echo "{\"mvrv\":$MVRV,\"date\":\"$TODAY\",\"source\":\"Blockchain.info (calculado)\",\"updated\":\"$UPDATED\"}" > $OUTFILE
              exit 0
            fi
          fi

          # ── Method 3: CoinMetrics community API ─────────────────────
          echo "==> Trying CoinMetrics..."
          RESP3=$(curl -sf --max-time 20 \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64)" \
            "https://community-api.coinmetrics.io/v4/timeseries/asset-metrics?assets=btc&metrics=CapMrktCurUSD,CapRealUSD&frequency=1d&page_size=2") || true

          if [ -n "$RESP3" ]; then
            MVRV=$(echo "$RESP3" | python3 -c "
import json,sys
try:
  rows=json.load(sys.stdin)['data']
  r=rows[-1]
  print(round(float(r['CapMrktCurUSD'])/float(r['CapRealUSD']),3))
except: pass
" 2>/dev/null) || true
            if [ -n "$MVRV" ] && python3 -c "v=float('$MVRV'); assert 0.3<v<15" 2>/dev/null; then
              echo "OK — MVRV=$MVRV (CoinMetrics)"
              echo "{\"mvrv\":$MVRV,\"date\":\"$TODAY\",\"source\":\"CoinMetrics\",\"updated\":\"$UPDATED\"}" > $OUTFILE
              exit 0
            fi
          fi

          # ── Method 4: Calculate from Bitaps (open blockchain API) ───
          echo "==> Trying Bitaps + Binance price..."
          SUPPLY=$(curl -sf --max-time 15 \
            "https://api.bitaps.com/btc/v1/blockchain/total/supply" \
            -H "User-Agent: Mozilla/5.0") || true
          PRICE=$(curl -sf --max-time 15 \
            "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT") || true

          if [ -n "$SUPPLY" ] && [ -n "$PRICE" ]; then
            # Get realized cap from blockchain.info stats endpoint
            STATS=$(curl -sf --max-time 15 "https://api.blockchain.info/stats") || true
            MVRV=$(python3 -c "
import json
try:
  sup=json.loads('''$SUPPLY''')
  pr=json.loads('''$PRICE''')
  st=json.loads('''$STATS''') if '''$STATS''' else {}
  price=float(pr['price'])
  # total_bitcoins in satoshis
  total_btc = float(st.get('totalbc', 0)) / 1e8
  if total_btc < 1000: total_btc = 19800000  # fallback known supply
  mkt_cap = price * total_btc
  # realized_cap not directly available here — skip this method
  pass
except Exception as e:
  pass
" 2>/dev/null) || true
          fi

          # ── All failed: keep existing value if valid ─────────────────
          echo "==> All sources failed. Checking existing file..."
          if [ -f "$OUTFILE" ]; then
            EXISTING=$(python3 -c "
import json
try:
  d=json.load(open('$OUTFILE'))
  v=d.get('mvrv')
  if v and float(v)>0: print(v)
except: pass
" 2>/dev/null) || true
            if [ -n "$EXISTING" ]; then
              echo "Keeping existing MVRV=$EXISTING from previous run"
              python3 -c "
import json
d=json.load(open('$OUTFILE'))
d['note']='kept from previous run — fetch failed today'
open('$OUTFILE','w').write(json.dumps(d, indent=2))
"
              exit 0
            fi
          fi

          echo "No valid data available — writing null"
          echo "{\"mvrv\":null,\"date\":\"$TODAY\",\"source\":\"unavailable\",\"updated\":\"$UPDATED\"}" > $OUTFILE

      - name: Show result
        run: cat data/mvrv.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mvrv.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update MVRV $(date -u +%Y-%m-%d)"
            git push
          fi

name: Update MVRV Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-mvrv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch MVRV
        run: python3 scripts/fetch_mvrv.py

      - name: Show result
        run: cat data/mvrv.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mvrv.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update MVRV $(date -u +%Y-%m-%d)"
            git push
          fi
